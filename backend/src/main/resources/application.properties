# =============================================================================
# Server
# =============================================================================
server.port=8080
server.servlet.context-path=/api

# =============================================================================
# MySQL DataSource
# =============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/tiffin_management_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=hellodeb@2024
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================================================
# File Upload (Aadhaar documents)
# =============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Custom upload directory (override per environment)
app.upload.base-dir=./uploads
app.upload.aadhaar-subdir=aadhaar

